name: build

on:
  push:
  pull_request:
  release:
    types:
      - created

jobs:

  build:
    timeout-minutes: 50

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    # bazelisk ships preinstalled on GitHub runners as `bazel` and honors the
    # version pinned in .bazelversion, so no manual bazel install is needed.
    - name: Build
      run: bazel build //...
    - name: Test
      run: bazel test //...
