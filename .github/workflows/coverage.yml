name: coverage

on:
  push:
  pull_request:
  release:
    types:
      - created

jobs:

  coverage:
    timeout-minutes: 50

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5
    - name: Install system dependencies
      run: |
           sudo apt update
           sudo apt install -y lcov
    # bazelisk ships preinstalled on GitHub runners as `bazel` and honors the
    # version pinned in .bazelversion, so no manual bazel install is needed.
    - name: Coverage
      run: |
           bazel coverage --combined_report=lcov //...
           genhtml bazel-out/_coverage/_coverage_report.dat -o report
           tar -czf report.tgz report
    - uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: report.tgz

    - name: Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: bazel-out/_coverage/_coverage_report.dat
